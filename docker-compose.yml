services:
  discord_bot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"

    entrypoint: ["sh", "/app/InaBot/banner.sh"]
    command: [ "uv", "run","python" ,"-m", "InaBot.main" ]

    env_file:
      - .env

    volumes:
      - webdata:/app/data

volumes:
  webdata: